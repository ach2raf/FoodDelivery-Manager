<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-5 flex-grow-1 text-center">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem;"></i>
        <h2 class="fw-bold mt-3">Ha ocurrido un error</h2>
        <p class="text-muted fs-5 mt-2" th:text="${error}"></p>
        <a href="/" class="btn btn-primary mt-3">
            <i class="bi bi-arrow-left me-1"></i>Volver al inicio
        </a>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
