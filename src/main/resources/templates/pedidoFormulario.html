<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Pedido - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100" style="padding-top:70px;">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 mb-5 flex-grow-1" style="max-width:500px;">
        <h2 class="fw-bold mb-4">
            <i class="bi bi-bag text-primary me-2"></i>
            <span th:text="${pedido.id == null} ? 'Nuevo Pedido' : 'Editar Pedido'"></span>
        </h2>
        <div class="card border-0 shadow-sm p-4">
            <form th:action="@{/pedidos/nuevoPedido/submit}" th:object="${pedido}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Código</label>
                    <input type="text" th:field="*{codigo}" class="form-control form-control-sm"
                        th:classappend="${#fields.hasErrors('codigo')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{codigo}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Cliente</label>
                    <input type="text" th:field="*{cliente}" class="form-control form-control-sm"
                        th:classappend="${#fields.hasErrors('cliente')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{cliente}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Contenido</label>
                    <input type="text" th:field="*{contenido}" class="form-control form-control-sm"
                        th:classappend="${#fields.hasErrors('contenido')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{contenido}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Precio (€)</label>
                    <input type="number" step="0.01" th:field="*{precio}" class="form-control form-control-sm"
                        th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{precio}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-sm btn-primary">
                        <i class="bi bi-save me-1"></i>Guardar
                    </button>
                    <a href="/pedidos" class="btn btn-sm btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
