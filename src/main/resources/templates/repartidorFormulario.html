<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Repartidor - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
        .just-eat-footer { background-color: #212529 !important; color: #ffffff; padding: 24px 0; border-top: 1px solid #343a40; }
        .footer-logo { font-size: 1.9rem; letter-spacing: -0.5px; }
        .social-title { font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.6); margin-bottom: 10px; }
        .social-icons-container { display: flex; justify-content: center; gap: 15px; }
        .just-eat-social-btn { width: 36px; height: 36px; border: 1.5px solid rgba(255,255,255,0.5); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 1.05rem; transition: all 0.2s ease-in-out; }
        .just-eat-social-btn:hover { background-color: #ffffff; color: #212529; border-color: #ffffff; transform: scale(1.05); }
        .project-subtext { font-size: 0.7rem; color: rgba(255,255,255,0.3); margin-top: 15px; }
    </style>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 mb-5 flex-grow-1" style="max-width: 500px;">        
        <h2 class="fw-bold mb-4">
            <i class="bi bi-person text-primary me-2"></i>
            <span th:text="${repartidor.id == null} ? 'Nuevo Repartidor' : 'Editar Repartidor'"></span>
        </h2>

        <div class="card border-0 shadow-sm p-4">
            <form th:action="@{/repartidores/nuevoRepartidor/submit}" th:object="${repartidor}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control form-control-sm"
                        th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{nombre}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Zona</label>
                    <input type="text" th:field="*{zona}" class="form-control form-control-sm"
                        th:classappend="${#fields.hasErrors('zona')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{zona}"></div>
                </div>

                <div th:if="${repartidor.id == null}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre de Usuario (Login)</label>
                        <input type="text" th:field="*{username}" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password" th:field="*{password}" class="form-control form-control-sm" required>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-sm btn-primary">
                        <i class="bi bi-save me-1"></i>Guardar
                    </button>
                    <a href="/repartidores" class="btn btn-sm btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
