<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Repartidor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4" style="max-width: 500px;">
    <h2 th:text="${repartidor.id == null} ? 'Nuevo Repartidor' : 'Editar Repartidor'"></h2>

    <form th:action="@{/repartidores/guardarRepartidor}" th:object="${repartidor}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control form-control-sm"
                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{nombre}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Zona</label>
            <input type="text" th:field="*{zona}" class="form-control form-control-sm"
                   th:classappend="${#fields.hasErrors('zona')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{zona}"></div>
        </div>

        <button type="submit" class="btn btn-sm btn-success">Guardar</button>
        <a href="/repartidores" class="btn btn-sm btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
