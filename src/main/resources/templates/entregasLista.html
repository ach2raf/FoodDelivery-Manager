<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Entregas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Entregas</h2>

    <div th:if="${param.error}" class="alert alert-danger">
        La entrega no existe o no se puede borrar
    </div>

    <a href="/entregas/nuevaEntrega" class="btn btn-primary mb-3">
        + Nueva Entrega
    </a>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Dirección</th>
                <th>Fecha</th>
                <th>Tiempo</th>
                <th>Repartidor</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="e : ${entregas}">
                <td th:text="${e.id}"></td>
                <td th:text="${e.direccion}"></td>
                <td th:text="${#temporals.format(e.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${e.tiempo} + ' min'"></td>
                <td th:text="${e.repartidor != null} ? ${e.repartidor.nombre} : 'Sin asignar'"></td>
                <td>
                    
                    <a th:href="@{/entregas/editarEntrega/{id}(id=${e.id})}"
                       class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/entregas/borrarEntrega/{id}(id=${e.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Seguro?')">Borrar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(entregas)}" class="alert alert-info">
        No hay entregas registradas.
    </div>
</div>
</body>
</html>
