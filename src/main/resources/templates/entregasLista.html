<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Entregas - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        body {
            padding-top: 70px;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .just-eat-footer {
            background-color: #212529;
            color: #ffffff;
            padding: 24px 0;
            border-top: 1px solid #343a40;
        }

        .footer-logo {
            font-size: 1.9rem;
            letter-spacing: -0.5px;
        }

        .social-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .social-icons-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .just-eat-social-btn {
            width: 36px;
            height: 36px;
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 1.05rem;
            transition: all 0.2s ease-in-out;
        }

        .just-eat-social-btn:hover {
            background-color: #ffffff;
            color: #212529;
            border-color: #ffffff;
            transform: scale(1.05);
        }

        .project-subtext {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 flex-grow-1">
        <h2 class="fw-bold mb-4">
            <i class="bi bi-truck text-primary me-2"></i>Entregas
        </h2>

        <div th:if="${param.error}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle me-2"></i>La entrega no existe o no se puede borrar
        </div>

        <a href="/entregas/nuevaEntrega" class="btn btn-primary mb-3">
            <i class="bi bi-plus-circle me-1"></i>Nueva Entrega
        </a>

        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Dirección</th>
                    <th>Fecha</th>
                    <th>Tiempo</th>
                    <th>Repartidor</th>
                    <th>Coste Total</th>
                    <th>Estado Pedidos</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${entregas}">
                    <td th:text="${e.id}"></td>
                    <td th:text="${e.direccion}"></td>
                    <td th:text="${#temporals.format(e.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${e.tiempo} + ' min'"></td>
                    <td th:text="${e.repartidor != null} ? ${e.repartidor.nombre} : 'Sin asignar'"></td>
                    
                    <td th:text="${e.entregaPedidos != null and !#lists.isEmpty(e.entregaPedidos)} 
                               ? ${#numbers.formatDecimal(#aggregates.sum(e.entregaPedidos.![coste]), 1, 2)} + ' €' 
                               : '0.00 €'">
                    </td>

                    <td>
                        <div th:each="ep : ${e.entregaPedidos}" class="d-flex align-items-center gap-2 mb-1">
                            <small class="text-muted" th:text="${ep.pedido.codigo} + ':'"></small>
                            
                            <span th:if="${ep.estado.name() == 'PENDIENTE'}" class="badge bg-secondary">PENDIENTE</span>
                            <span th:if="${ep.estado.name() == 'EN_REPARTO'}" class="badge bg-info text-dark">EN REPARTO</span>
                            <span th:if="${ep.estado.name() == 'ENTREGADO'}" class="badge bg-success">ENTREGADO</span>
                            
                            <a th:if="${ep.estado.name() == 'EN_REPARTO'}" 
                               th:href="@{/entregas/completarPedido/{id}(id=${ep.id})}" 
                               class="btn btn-xs btn-outline-success py-0 px-1" 
                               style="font-size: 0.7rem;" 
                               title="Marcar como entregado">
                                <i class="bi bi-check2"></i> Listo
                            </a>
                        </div>
                        <span th:if="${#lists.isEmpty(e.entregaPedidos)}" class="badge bg-light text-muted border">Sin pedidos</span>
                    </td>

                    <td>
                        <a th:href="@{/entregas/asignarPedido/{id}(id=${e.id})}" class="btn btn-sm btn-success">
                            <i class="bi bi-box-arrow-in-down"></i> Asignar
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/entregas/editarEntrega/{id}(id=${e.id})}" class="btn btn-sm btn-warning">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/entregas/borrarEntrega/{id}(id=${e.id})}" class="btn btn-sm btn-danger"
                            onclick="return confirm('¿Seguro que quieres borrar esta entrega?')">
                            <i class="bi bi-trash"></i> Borrar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(entregas)}" class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>No hay entregas registradas.
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
