<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        .social-btn:hover {
            background-color: #fff;
            color: #212529;
            border-color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <nav th:fragment="navbar" class="navbar navbar-expand-md navbar-dark bg-dark fixed-top shadow border-bottom border-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2 me-4" th:href="@{/}">
                <i class="bi bi-box-seam-fill text-danger fs-4"></i>
                <span class="text-white">Food</span><span class="text-primary">Delivery</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item"><a class="nav-link active" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/pedidos}">Pedidos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/entregas}">Entregas</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/repartidores}">Repartidores</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="bg-dark text-white text-center py-4 border-top border-secondary mt-auto shadow-lg">
        <div class="container">
            <div class="mb-2">
                <span class="fs-2 fw-bold d-inline-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-box-seam-fill text-danger"></i>
                    <span class="text-white">Food</span><span class="text-primary">Delivery</span>
                </span>
            </div>

            <div class="text-uppercase small fw-semibold text-white-50 mb-2">Síguenos</div>

            <div class="d-flex justify-content-center gap-3">
                <a href="#" class="social-btn rounded-circle border border-secondary d-inline-flex align-items-center justify-content-center text-white-50 text-decoration-none" style="width:36px;height:36px;transition:all .2s;" title="Facebook"><i class="bi bi-facebook"></i></a>
                <a href="#" class="social-btn rounded-circle border border-secondary d-inline-flex align-items-center justify-content-center text-white-50 text-decoration-none" style="width:36px;height:36px;transition:all .2s;" title="Instagram"><i class="bi bi-instagram"></i></a>
                <a href="#" class="social-btn rounded-circle border border-secondary d-inline-flex align-items-center justify-content-center text-white-50 text-decoration-none" style="width:36px;height:36px;transition:all .2s;" title="X (Twitter)"><i class="bi bi-twitter-x"></i></a>
                <a href="#" class="social-btn rounded-circle border border-secondary d-inline-flex align-items-center justify-content-center text-white-50 text-decoration-none" style="width:36px;height:36px;transition:all .2s;" title="YouTube"><i class="bi bi-youtube"></i></a>
            </div>

            <div class="text-white-50 mt-3" style="font-size:0.7rem;opacity:.4;">
                &copy; 2026 FoodDelivery Manager — Panel Integral de Logística y Reparto (1º DAM)
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
