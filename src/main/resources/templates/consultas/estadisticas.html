<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas Financieras - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100" style="padding-top:70px;">
    
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 flex-grow-1">
        <h2 class="fw-bold mb-2">
            <i class="bi bi-graph-up text-primary me-2"></i>Estadísticas Financieras
        </h2>
        <p class="text-muted mb-4">Resumen del coste medio y el repartidor con más ingresos.</p>

        <div class="row justify-content-center mt-5">
            
            <div class="col-md-5 mb-4">
                <div class="card bg-primary text-white shadow h-100 text-center">
                    <div class="card-body py-5">
                        <h4 class="card-title mb-4"><i class="bi bi-cash-coin me-2"></i>Coste Medio por Pedido</h4>
                        <h1 class="display-3 fw-bold" th:text="${#numbers.formatDecimal(costeMedio, 1, 2)} + ' €'">
                            0.00 €
                        </h1>
                    </div>
                </div>
            </div>

            <div class="col-md-5 mb-4">
                <div class="card bg-dark text-white shadow h-100 text-center">
                    <div class="card-body py-5">
                        <h4 class="card-title mb-4"><i class="bi bi-trophy me-2"></i>Repartidor Top Ingresos</h4>
                        
                        <div th:if="${mejorRepartidor != null}">
                            <h2 class="fw-bold text-uppercase" th:text="${mejorRepartidor.nombre}">Nombre Repartidor</h2>
                            <h3 class="mt-3">
                                <span class="badge  text-light fs-4" th:text="${#numbers.formatDecimal(totalIngresos, 1, 2)} + ' €'">0.00 €</span>
                            </h3>
                        </div>

                        <div th:if="${mejorRepartidor == null}">
                            <p class="lead mt-4">Aún no hay entregas registradas.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="text-center mt-4 mb-5">
            <a href="/" class="btn btn-outline-secondary px-4 py-2">
                <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
