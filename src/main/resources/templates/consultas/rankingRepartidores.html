<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Repartidores - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100" style="padding-top:70px;">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 flex-grow-1">
        <h2 class="fw-bold mb-2">
            <i class="bi bi-trophy text-warning me-2"></i>Ranking de Repartidores
        </h2>
        <p class="text-muted mb-4">Listado de repartidores ordenados por la cantidad total de entregas realizadas.</p>

        <table class="table table-striped table-hover align-middle" th:if="${!#lists.isEmpty(entregas)}">
            <thead class="table-dark">
                <tr>
                    <th style="width: 100px;">Puesto</th>
                    <th>Nombre Repartidor</th>
                    <th>Zona</th>
                    <th>Total Entregas</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e, iterStat : ${entregas}">
                    <td>
                        <span class="fw-bold" th:text="${iterStat.count} + 'º'"></span>
                    </td>
                    <td th:text="${e[0].nombre}"></td>
                    <td th:text="${e[0].zona}"></td>
                    <td>
                        <span class="badge bg-primary fs-6" th:text="${e[1]}"></span>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(entregas)}" class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>No hay datos disponibles para el ranking.
        </div>

        <a href="/" class="btn btn-sm btn-outline-secondary mt-3">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
