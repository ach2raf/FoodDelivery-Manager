<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedidos por Fecha - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100" style="padding-top:70px;">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 flex-grow-1">
        <h2 class="fw-bold mb-4">
            <i class="bi bi-calendar3 text-primary me-2"></i>Pedidos por Fecha
        </h2>
        <div class="card border-0 shadow-sm p-4 mb-4">
            <form th:action="@{/consultas/pedidosPorFecha}" method="get" class="row g-3 align-items-end">
                <div class="col-auto">
                    <label class="form-label fw-semibold">Desde</label>
                    <input type="datetime-local" name="inicio" class="form-control form-control-sm">
                </div>
                <div class="col-auto">
                    <label class="form-label fw-semibold">Hasta</label>
                    <input type="datetime-local" name="fin" class="form-control form-control-sm">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-primary">
                        <i class="bi bi-search me-1"></i>Buscar
                    </button>
                </div>
            </form>
        </div>

        <div th:if="${entregas != null}">
            <table class="table table-striped table-hover align-middle" th:if="${!#lists.isEmpty(entregas)}">
                <thead class="table-dark">
                    <tr><th>Dirección</th><th>Fecha</th><th>Tiempo</th><th>Repartidor</th><th>Pedidos</th></tr>
                </thead>
                <tbody>
                    <tr th:each="e : ${entregas}">
                        <td th:text="${e.direccion}"></td>
                        <td th:text="${#temporals.format(e.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${e.tiempo} + ' min'"></td>
                        <td th:text="${e.repartidor != null} ? ${e.repartidor.nombre} : '-'"></td>
                        <td th:text="${#lists.size(e.entregaPedidos)}"></td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(entregas)}" class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i>No hay entregas en ese rango de fechas.
            </div>
        </div>

        <a href="/" class="btn btn-sm btn-outline-secondary mt-3">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
