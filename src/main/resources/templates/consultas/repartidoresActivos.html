<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Repartidores Activos - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100" style="padding-top:70px;">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 flex-grow-1">
        <h2 class="fw-bold mb-2">
            <i class="bi bi-person-check text-primary me-2"></i>Repartidores Activos
        </h2>
        <p class="text-muted mb-4">Repartidores con entregas en estado EN REPARTO.</p>

        <table class="table table-striped table-hover align-middle" th:if="${!#lists.isEmpty(repartidores)}">
            <thead class="table-dark">
                <tr><th>Nombre</th><th>Zona</th></tr>
            </thead>
            <tbody>
                <tr th:each="r : ${repartidores}">
                    <td th:text="${r.nombre}"></td>
                    <td><span class="badge bg-primary" th:text="${r.zona}"></span></td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(repartidores)}" class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>No hay repartidores activos ahora mismo.
        </div>

        <a href="/" class="btn btn-sm btn-outline-secondary mt-3">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
