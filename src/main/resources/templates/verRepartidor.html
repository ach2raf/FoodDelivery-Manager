<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Repartidor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4" style="max-width: 500px;">
    <h2>Detalle del Repartidor</h2>

    <div class="card p-4 shadow-sm border-0 mt-3">
        <p><strong>ID:</strong> <span th:text="${repartidor.id}"></span></p>
        <p><strong>Nombre:</strong> <span th:text="${repartidor.nombre}"></span></p>
        <p><strong>Zona:</strong> <span th:text="${repartidor.zona}"></span></p>
    </div>

    <div class="mt-3">
        <a th:href="@{/repartidores/editarRepartidor/{id}(id=${repartidor.id})}"
           class="btn btn-sm btn-warning">Editar</a>
        <a href="/repartidores" class="btn btn-sm btn-secondary">Volver</a>
    </div>
</div>
</body>
</html>
