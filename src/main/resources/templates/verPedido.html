<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Pedido - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100" style="padding-top:70px;">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 flex-grow-1" style="max-width:500px;">
        <h2 class="fw-bold mb-4">
            <i class="bi bi-bag text-primary me-2"></i>Detalle del Pedido
        </h2>
        <div class="card border-0 shadow-sm p-4">
            <p><strong>ID:</strong> <span th:text="${pedido.id}"></span></p>
            <p><strong>Código:</strong> <span th:text="${pedido.codigo}"></span></p>
            <p><strong>Cliente:</strong> <span th:text="${pedido.cliente}"></span></p>
            <p><strong>Contenido:</strong> <span th:text="${pedido.contenido}"></span></p>
            <p><strong>Precio:</strong>
                <span class="badge bg-success fs-6" th:text="${pedido.precio} + ' €'"></span>
            </p>
        </div>
        <div class="mt-3 d-flex gap-2">
            <a th:href="@{/pedidos/editarPedido/{id}(id=${pedido.id})}" class="btn btn-sm btn-warning">
                <i class="bi bi-pencil me-1"></i>Editar
            </a>
            <a href="/pedidos" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
