<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedido</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4" style="max-width: 500px;">
    <h2>Detalle del Pedido</h2>

    <div class="card p-4 shadow-sm border-0 mt-3">
        <p><strong>ID:</strong> <span th:text="${pedido.id}"></span></p>
        <p><strong>Código:</strong> <span th:text="${pedido.codigo}"></span></p>
        <p><strong>Cliente:</strong> <span th:text="${pedido.cliente}"></span></p>
        <p><strong>Contenido:</strong> <span th:text="${pedido.contenido}"></span></p>
        <p><strong>Precio:</strong> <span th:text="${pedido.precio} + ' €'"></span></p>
    </div>
     <div class="mt-3">
        <a th:href="@{/pedidos/editarPedido/{id}(id=${pedido.id})}"
           class="btn btn-sm btn-warning">Editar</a>
        <a href="/pedidos" class="btn btn-sm btn-secondary">Volver</a>
    </div>
</div>
</body>
</html>
