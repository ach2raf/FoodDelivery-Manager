<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<head>
    <meta charset="UTF-8">
    <title>Pedidos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>


<body>
    <div class="container mt-4">
        <h2>Pedidos</h2>
        <a href="/pedidos/nuevoPedido" class="btn btn-primary mb-3">+ Nuevo Pedido</a>


        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Cliente</th>
                    <th>Contenido</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${pedidos}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.codigo}"></td>
                    <td th:text="${p.cliente}"></td>
                    <td th:text="${p.contenido}"></td>
                    <td th:text="${p.precio} + ' €'"></td>
                    <td>
                        <a th:href="@{/pedidos/editarPedido/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/pedidos/borrarPedido/{id}(id=${p.id})}" class="btn btn-sm btn-danger"
                            onclick="return confirm('¿Seguro que quieres eliminar este pedido?')">
                            Borrar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>


        <div th:if="${#lists.isEmpty(pedidos)}" class="alert alert-info">
            No hay pedidos registrados.
        </div>
    </div>
</body>


</html>
