<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedidos - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100" style="padding-top:70px;">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 flex-grow-1">
        <h2 class="fw-bold mb-4">
            <i class="bi bi-bag text-primary me-2"></i>Pedidos
        </h2>

        <a href="/pedidos/nuevoPedido" class="btn btn-primary mb-3">
            <i class="bi bi-plus-circle me-1"></i>Nuevo Pedido
        </a>

        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th><th>Código</th><th>Cliente</th><th>Contenido</th><th>Precio</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${pedidos}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.codigo}"></td>
                    <td th:text="${p.cliente}"></td>
                    <td th:text="${p.contenido}"></td>
                    <td th:text="${p.precio} + ' €'"></td>
                    <td>
                        <a th:href="@{/pedidos/verPedido/{id}(id=${p.id})}" class="btn btn-sm btn-info">
                            <i class="bi bi-eye"></i> Ver
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/pedidos/editarPedido/{id}(id=${p.id})}" class="btn btn-sm btn-warning">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/pedidos/borrarPedido/{id}(id=${p.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Seguro que quieres eliminar este pedido?')">
                            <i class="bi bi-trash"></i> Borrar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(pedidos)}" class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>No hay pedidos registrados.
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
