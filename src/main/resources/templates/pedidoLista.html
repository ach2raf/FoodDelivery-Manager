<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Pedidos - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        body {
            padding-top: 70px;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .just-eat-footer {
            background-color: #212529;
            color: #ffffff;
            padding: 24px 0;
            border-top: 1px solid #343a40;
        }

        .footer-logo {
            font-size: 1.9rem;
            letter-spacing: -0.5px;
        }

        .social-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .social-icons-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .just-eat-social-btn {
            width: 36px;
            height: 36px;
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 1.05rem;
            transition: all 0.2s ease-in-out;
        }

        .just-eat-social-btn:hover {
            background-color: #ffffff;
            color: #212529;
            border-color: #ffffff;
            transform: scale(1.05);
        }

        .project-subtext {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 flex-grow-1">
        <h2 class="fw-bold mb-4">
            <i class="bi bi-bag text-primary me-2"></i>Pedidos
        </h2>

        <a href="/pedidos/nuevoPedido" class="btn btn-primary mb-3">
            <i class="bi bi-plus-circle me-1"></i>Nuevo Pedido
        </a>

        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Cliente</th>
                    <th>Contenido</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${pedidos}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.codigo}"></td>
                    <td th:text="${p.cliente}"></td>
                    <td th:text="${p.contenido}"></td>
                    <td th:text="${p.precio} + ' €'"></td>
                    <td>
                        <a th:href="@{/pedidos/verPedido/{id}(id=${p.id})}" class="btn btn-sm btn-info">
                            <i class="bi bi-eye"></i> Ver
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/pedidos/editarPedido/{id}(id=${p.id})}"
                            class="btn btn-sm btn-warning">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/pedidos/borrarPedido/{id}(id=${p.id})}"
                            class="btn btn-sm btn-danger"
                            onclick="return confirm('¿Seguro que quieres eliminar este pedido?')">
                            <i class="bi bi-trash"></i> Borrar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(pedidos)}" class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>No hay pedidos registrados.
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
