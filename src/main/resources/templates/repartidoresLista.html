<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Repartidores - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100" style="padding-top:70px;">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 flex-grow-1">
        <h2 class="fw-bold mb-4">
            <i class="bi bi-people text-primary me-2"></i>Repartidores
        </h2>

        <div th:if="${param.error}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle me-2"></i>El repartidor no existe o no se puede borrar
        </div>

        <a sec:authorize="hasRole('ADMIN')" href="/repartidores/nuevoRepartidor" class="btn btn-primary mb-3">
            <i class="bi bi-person-plus me-1"></i>Nuevo Repartidor
        </a>

        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr><th>ID</th><th>Nombre</th><th>Zona</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                <tr th:each="r : ${repartidores}">
                    <td th:text="${r.id}"></td>
                    <td th:text="${r.nombre}"></td>
                    <td th:text="${r.zona}"></td>
                    <td>
                        <a th:href="@{/repartidores/verRepartidor/{id}(id=${r.id})}" class="btn btn-sm btn-info">
                            <i class="bi bi-eye"></i> Ver
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/repartidores/editarRepartidor/{id}(id=${r.id})}" class="btn btn-sm btn-warning">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/repartidores/borrarRepartidor/{id}(id=${r.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Seguro que quieres eliminar este repartidor?')">
                            <i class="bi bi-trash"></i> Borrar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(repartidores)}" class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>No hay repartidores registrados.
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
