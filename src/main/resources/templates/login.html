<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodDelivery - Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    .col-img-full {
      background-image: url('https://media.istockphoto.com/id/1756238235/es/foto/conductor-masculino-seguro-de-s%C3%AD-mismo-de-pie-al-frente-de-su-cami%C3%B3n.jpg?s=612x612&w=0&k=20&c=ThgUk2GFvjOnJvwYUWQzqLWt0CW1XElhJn9CPOS8sag=');
      background-size: cover;
      background-position: center;
      min-height: 100%;
    }
  </style>
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-5">
  <div class="container d-flex justify-content-center">

    <div class="shadow border-start border-4 border-primary rounded overflow-hidden bg-white"
         style="max-width:850px; width:100%;">
      <div class="row g-0 align-items-stretch">

        <div class="col-12 col-md-6 p-5">
          <div class="text-center mb-4">
            <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
              <i class="bi bi-box-seam-fill text-danger fs-3"></i>
              <span class="fs-4 fw-bold text-dark">Food</span><span class="fs-4 fw-bold text-primary">Delivery</span>
            </div>
            <hr class="my-3">
          </div>

          <form th:action="@{/login}" method="POST">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="mb-3">
              <label for="username" class="form-label small fw-bold text-muted mb-1">Usuario</label>
              <div class="input-group">
                <span class="input-group-text bg-light text-muted"><i class="bi bi-person"></i></span>
                <input type="text" id="username" name="username" class="form-control bg-light"
                       placeholder="Usuario" required autofocus />
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label small fw-bold text-muted mb-1">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" name="password" class="form-control bg-light"
                       placeholder="••••••••" required />
              </div>
            </div>

            <div th:if="${param.error}" class="alert alert-danger py-2 small mb-3 border-0 rounded">
              <i class="bi bi-exclamation-triangle-fill me-1"></i> Usuario o contraseña incorrectos
            </div>

            <div th:if="${param.logout}" class="alert alert-success py-2 small mb-3 border-0 rounded">
              <i class="bi bi-check-circle-fill me-1"></i> Sesión cerrada correctamente
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
              <i class="bi bi-box-arrow-in-right me-1"></i>Entrar al Sistema
            </button>
          </form>

          <div class="text-center mt-4">
            <a th:href="@{/}" class="text-decoration-none small text-primary fw-semibold">
              <i class="bi bi-arrow-left"></i> Volver al Inicio
            </a>
          </div>
        </div>

        <div class="col-md-6 d-none d-md-block col-img-full"></div>

      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
