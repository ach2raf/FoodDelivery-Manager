<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Formulario Entrega - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        body {
            padding-top: 70px;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .just-eat-footer {
            background-color: #212529;
            color: #ffffff;
            padding: 24px 0;
            border-top: 1px solid #343a40;
        }

        .footer-logo {
            font-size: 1.9rem;
            letter-spacing: -0.5px;
        }

        .social-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .social-icons-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .just-eat-social-btn {
            width: 36px;
            height: 36px;
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 1.05rem;
            transition: all 0.2s ease-in-out;
        }

        .just-eat-social-btn:hover {
            background-color: #ffffff;
            color: #212529;
            border-color: #ffffff;
            transform: scale(1.05);
        }

        .project-subtext {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 mb-5 flex-grow-1" style="max-width: 500px;">
        <h2 class="fw-bold mb-4">
            <i class="bi bi-truck text-primary me-2"></i>
            <span th:text="${entrega.id == null} ? 'Nueva Entrega' : 'Editar Entrega'"></span>
        </h2>

        <div class="card border-0 shadow-sm p-4">
            <form th:action="@{/entregas/nuevaEntrega/submit}" th:object="${entrega}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control form-control-sm" required
                        th:classappend="${#fields.hasErrors('direccion')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{direccion}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Fecha</label>
                    <input type="datetime-local" th:field="*{fecha}" class="form-control form-control-sm" required
                        th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{fecha}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Tiempo (minutos, máx. 120)</label>
                    <input type="number" th:field="*{tiempo}" class="form-control form-control-sm" required min="1"
                        max="120" th:classappend="${#fields.hasErrors('tiempo')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{tiempo}"></div>
                    <div id="coste-estimado" class="alert alert-info mt-2 d-none py-1 small"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Repartidor</label>
                    <select th:field="*{repartidor.id}" class="form-select form-select-sm">
                        <option value="">-- Selecciona repartidor --</option>
                        <option th:each="r : ${repartidores}" th:value="${r.id}"
                            th:text="${r.nombre} + ' - ' + ${r.zona}">
                        </option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-sm btn-primary">
                        <i class="bi bi-save me-1"></i>Guardar
                    </button>
                    <a href="/entregas" class="btn btn-sm btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('#tiempo').addEventListener('input', function () {
            const tiempo = parseInt(this.value) || 0;
            const factor = tiempo > 60 ? 1.5 : tiempo > 30 ? 1.2 : 1.0;
            const coste = (tiempo * factor).toFixed(2);
            const div = document.querySelector('#coste-estimado');
            if (tiempo > 0) {
                div.classList.remove('d-none');
                div.textContent = ' Coste estimado: ' + coste + ' €';
            } else {
                div.classList.add('d-none');
            }
        });
    </script>
</body>

</html>
