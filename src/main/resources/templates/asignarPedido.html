<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asignar Pedido - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100" style="padding-top:70px;">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4 mb-5 flex-grow-1" style="max-width:550px;">
        <h2 class="fw-bold mb-4">
            <i class="bi bi-box-arrow-in-down text-primary me-2"></i>Asignar Pedido a Entrega
        </h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card border-0 shadow-sm p-3 mb-4">
            <p class="mb-1"><strong>Dirección:</strong> <span th:text="${entrega.direccion}"></span></p>
            <p class="mb-1"><strong>Fecha:</strong> <span th:text="${#temporals.format(entrega.fecha, 'dd/MM/yyyy HH:mm')}"></span></p>
            <p class="mb-0"><strong>Repartidor:</strong>
                <span th:text="${entrega.repartidor != null} ? ${entrega.repartidor.nombre} : 'Sin asignar'"></span>
            </p>
        </div>

        <div class="card border-0 shadow-sm p-4">
            <div id="contenedor-errores"></div>
            <form th:action="@{/entregas/asignarPedido/submit}" method="post" novalidate>
                <input type="hidden" name="entregaId" th:value="${entrega.id}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Pedido</label>
                    <select name="pedidoId" class="form-select form-select-sm">
                        <option value="">-- Selecciona pedido --</option>
                        <option th:each="p : ${pedidos}" th:value="${p.id}"
                            th:text="${p.codigo} + ' - ' + ${p.cliente} + ' (' + ${p.precio} + ' €)'">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Prioridad</label>
                    <input type="number" name="prioridad" class="form-control form-control-sm">
                    <div class="form-text">1 = máxima prioridad</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-sm btn-primary">
                        <i class="bi bi-check-circle me-1"></i>Asignar
                    </button>
                    <a href="/entregas" class="btn btn-sm btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const formulario = document.querySelector('form');
            const contenedorErrores = document.getElementById('contenedor-errores');
            if (formulario) {
                formulario.addEventListener('submit', function (e) {
                    let errores = [];
                    const pedido = document.querySelector('[name="pedidoId"]').value;
                    if (pedido === '') errores.push('Debes seleccionar un pedido');
                    const prioridadVal = document.querySelector('[name="prioridad"]').value;
                    const prioridad = parseInt(prioridadVal);
                    if (prioridadVal.trim() === '' || isNaN(prioridad) || prioridad < 1)
                        errores.push('La prioridad debe ser un número mayor que 0');
                    if (errores.length > 0) {
                        e.preventDefault();
                        contenedorErrores.innerHTML = '';
                        const alerta = document.createElement('div');
                        alerta.className = 'alert alert-danger mb-3';
                        alerta.innerHTML = '<strong>Corrige los siguientes errores:</strong><ul>' +
                            errores.map(err => '<li>' + err + '</li>').join('') + '</ul>';
                        contenedorErrores.appendChild(alerta);
                    }
                });
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
